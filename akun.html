<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f9f9f9;
  color: #222;
  min-height: 100vh;
  padding: 20px;
}
header {
  text-align: center;
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 20px;
}
#search {
  width: 90%;
  max-width: 400px;
  padding: 8px 10px;
  margin: 0 auto 15px auto;
  display: block;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
}
.list {
  max-width: 400px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.item {
  background: #fff;
  border-radius: 12px;
  padding: 12px;
  border: 1px solid #ccc;
  box-shadow: 0 3px 6px rgba(0,0,0,0.06);
}
.item img {
  max-width: 100%;
  border-radius: 8px;
  margin-top: 6px;
}
.item span {
  display: block;
  font-size: 12px;
  color: #555;
}
</style>
</head>
<body>

<header>Daftar Akun</header>
<input type="text" id="search" placeholder="Cari ID / Server / Dikirim Oleh...">
<div class="list" id="list"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSDwdzrKNOhyoBHBO8aVq-FxAyZIwFdL4",
  authDomain: "berkoar-6fc3a.firebaseapp.com",
  databaseURL: "https://berkoar-6fc3a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "berkoar-6fc3a",
  storageBucket: "berkoar-6fc3a.firebasestorage.app",
  messagingSenderId: "801041924361",
  appId: "1:801041924361:web:30e6d18b0e97837a6b93d8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');
let akunData = [];

db.ref('akun').on('value', snapshot => {
  const data = snapshot.val();
  akunData = [];
  listEl.innerHTML = '';
  for(const key in data){
    akunData.push(data[key]);
  }
  renderList(akunData);
});

function renderList(data){
  listEl.innerHTML = '';
  data.forEach(d=>{
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <b>ID:</b> ${d.id}<br>
      <b>Server:</b> ${d.server}<br>
      <b>Dikirim Oleh:</b> ${d.dikirim}<br>
      <b>Tanggal:</b> ${d.tanggal}
      ${d.foto?`<img src="${d.foto}">`:''}
    `;
    listEl.appendChild(div);
  });
}

// SEARCH REALTIME
searchEl.addEventListener('input', e=>{
  const q = e.target.value.toLowerCase();
  const filtered = akunData.filter(d=> 
    d.id.toLowerCase().includes(q) || 
    d.server.toLowerCase().includes(q) ||
    d.dikirim.toLowerCase().includes(q)
  );
  renderList(filtered);
});
</script>
</body>
</html>
