<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Akun</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 10px;
}
input {
  width: 95%;
  padding: 10px;
  margin-bottom: 15px;
}
.box {
  background: #fff;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}
img {
  width: 100%;
  border-radius: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<h2>DATA AKUN</h2>

<input type="text" id="search" placeholder="Cari ID / Server / Kode..." onkeyup="filterData()">

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  databaseURL: "https://berkoar-6fc3a-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = firebase.database();
const list = document.getElementById('list');

// LOAD DATA
db.ref('akun').on('value', snap=>{
  list.innerHTML = '';

  snap.forEach(d=>{
    const data = d.val();

    list.innerHTML += `
      <div class="box">
        <b>ID:</b> ${data.id}<br>
        <b>Server:</b> ${data.server}<br>
        <b>Kode:</b> ${data.kode}<br>
        ${data.foto ? `<img src="${data.foto}">` : `<i>Tidak ada foto</i>`}
      </div>
    `;
  });
});

// SEARCH
function filterData(){
  const k = search.value.toLowerCase();

  document.querySelectorAll('.box').forEach(box=>{
    box.style.display = box.innerText.toLowerCase().includes(k)
      ? 'block'
      : 'none';
  });
}
</script>

</body>
</html>
