<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f9f9f9;
  color: #222;
  min-height: 100vh;
  margin: 0;
  padding: 0;
}
header {
  text-align: center;
  padding: 20px 0;
  font-size: 28px;
  font-weight: 600;
}
.container {
  width: 90%;
  max-width: 700px;
  margin: 0 auto;
}
.search-box {
  margin-bottom: 15px;
  display: flex;
  justify-content: center;
}
.search-box input {
  width: 80%;
  max-width: 300px;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 30px;
}
th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}
th {
  background: #eee;
}
img {
  max-width: 80px;
  border-radius: 6px;
}
</style>
</head>
<body>

<header>Daftar Akun HB AN</header>
<div class="container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari ID / Server / Dikirim Oleh..." onkeyup="filterTable()">
  </div>
  <table id="akunTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Server</th>
        <th>Foto</th>
        <th>Dikirim Oleh</th>
        <th>Tanggal Kirim</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data akan muncul di sini -->
    </tbody>
  </table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSDwdzrKNOhyoBHBO8aVq-FxAyZIwFdL4",
  authDomain: "berkoar-6fc3a.firebaseapp.com",
  databaseURL: "https://berkoar-6fc3a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "berkoar-6fc3a",
  storageBucket: "berkoar-6fc3a.firebasestorage.app",
  messagingSenderId: "801041924361",
  appId: "1:801041924361:web:30e6d18b0e97837a6b93d8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const tableBody = document.querySelector("#akunTable tbody");

db.ref("akun").on("value", snapshot => {
  tableBody.innerHTML = "";
  snapshot.forEach(child => {
    const data = child.val();
    const tr = document.createElement("tr");

    const tanggal = data.tanggal ? new Date(data.tanggal).toLocaleString('id-ID', {day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '-';
    const dikirim = data.dikirimOleh || '-';

    tr.innerHTML = `
      <td>${data.id}</td>
      <td>${data.server}</td>
      <td>${data.foto ? '<img src="'+data.foto+'" alt="Foto">' : '-'}</td>
      <td>${dikirim}</td>
      <td>${tanggal}</td>
    `;
    tableBody.appendChild(tr);
  });
});

function filterTable() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const rows = tableBody.getElementsByTagName("tr");
  for(let i=0;i<rows.length;i++){
    const rowText = rows[i].innerText.toLowerCase();
    rows[i].style.display = rowText.includes(input) ? "" : "none";
  }
}
</script>

</body>
</html>
