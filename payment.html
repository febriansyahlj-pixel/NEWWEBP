<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f9f9f9;
  display:flex;
  flex-direction:column;
  align-items:center;
}
header {font-size:24px;padding:15px;}
.container {width:90%;max-width:400px;}
.box {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<header>Daftar Payment</header>
<div class="container" id="paymentList"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSDwdzrKNOhyoBHBO8aVq-FxAyZIwFdL4",
  authDomain: "berkoar-6fc3a.firebaseapp.com",
  databaseURL: "https://berkoar-6fc3a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "berkoar-6fc3a",
  storageBucket: "berkoar-6fc3a.firebasestorage.app",
  messagingSenderId: "801041924361",
  appId: "1:801041924361:web:30e6d18b0e97837a6b93d8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const list = document.getElementById('paymentList');

db.ref('payment').on('value', snap=>{
  list.innerHTML='';
  snap.forEach(child=>{
    const d=child.val();
    list.innerHTML+=`
      <div class="box">
        <p>Nama: ${d.nama}</p>
        <p>Rek: ${d.rek}</p>
      </div>`;
  });
});
</script>

</body>
</html>
