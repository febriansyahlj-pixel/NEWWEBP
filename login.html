<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Login Admin - FUHH MEMBANTU</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* STYLE SAMA PERSIS INDEX */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f9f9f9 0%, #e8e8e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
    }
    
    .logo {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #333 0%, #555 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #eee;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
      font-family: 'Poppins', sans-serif;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #333;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    
    .login-btn:hover {
      background: #555;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    
    .login-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      border-left: 4px solid #c33;
      font-size: 13px;
    }
    
    .success {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      border-left: 4px solid #3c3;
      font-size: 13px;
    }
    
    .loading {
      display: none;
      margin: 10px 0;
    }
    
    .spinner {
      border: 2px solid #f3f3f3;
      border-top: 2px solid #333;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
      display: inline-block;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
        margin: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">FUHH</div>
    <div class="subtitle">Admin Panel</div>
    
    <form id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" id="username" required>
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" required>
      </div>
      
      <div id="message"></div>
      
      <div class="loading" id="loading">
        <div class="spinner"></div> Login...
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Masuk
      </button>
    </form>
  </div>

  <script>
    // CREDENSHIAL - UBAH SESUKA KAMU
    const ADMIN_CREDENTIALS = {
      username: 'Fuhh',
      password: '123aja11' // UBAH INI!
    };

    const form = document.getElementById('loginForm');
    const messageEl = document.getElementById('message');
    const loginBtn = document.getElementById('loginBtn');
    const loadingEl = document.getElementById('loading');

    function showMessage(text, type) {
      messageEl.innerHTML = text;
      messageEl.className = type;
    }

    function clearMessage() {
      messageEl.innerHTML = '';
      messageEl.className = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      
      clearMessage();
      
      if (!username || !password) {
        showMessage('Isi username dan password!', 'error');
        return;
      }
      
      // SHOW LOADING
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<div class="spinner"></div> Masuk...';
      loadingEl.style.display = 'block';
      
      // FAKE DELAY (realistis)
      await new Promise(r => setTimeout(r, 1200));
      
      // VALIDASI
      if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
        // SIMPAN SESSION
        localStorage.setItem('fuhh_admin', 'true');
        localStorage.setItem('fuhh_username', username);
        
        showMessage('Login berhasil! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 1000);
      } else {
        showMessage('Username atau password salah!', 'error');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
        loadingEl.style.display = 'none';
      }
    });

    // AUTO LOGIN CHECK
    if (localStorage.getItem('fuhh_admin') === 'true') {
      window.location.href = 'admin.html';
    }
  </script>
</body>
</html>
