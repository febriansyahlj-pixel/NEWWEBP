.popup-box input {

  border-radius:8px;

</head>
<body>

<script>
/* 🔥 FUNGSI FINAL - SEMUA MASALAH TERATAS! */
const firebaseConfig = {
  apiKey: "AIzaSyCSDwdzrKNOhyoBHBO8aVq-FxAyZIwFdL4",
  authDomain: "berkoar-6fc3a.firebaseapp.com",
  databaseURL: "https://berkoar-6fc3a-default-rtdb.asia-southeast1.firebasedatabase.app",

  storageBucket: "berkoar-6fc3a.firebasestorage.app",

  appId: "1:801041924361:web:30e6d18b0e97837a6b93d8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// TELEGRAM CONFIG
const TOKEN = '8707862536:AAHy5jcse4lm9YmKPJ7AYfuR5JwgxPj1fsM';
const CHAT_ID = '7717485230';

// ELEMENTS
const mainPopup = document.getElementById('mainPopup');
const sawerPopup = document.getElementById('sawerPopup');

// POPUP FUNCTIONS ✅ FIXED
function openMainPopup(){ mainPopup.style.display='flex'; }
function closeMainPopup(){ mainPopup.style.display='none'; }
function openSubPopup(type){
  closeMainPopup();
  document.getElementById(type+'Popup').style.display='flex';
}
function closeSubPopup(type){
  document.getElementById(type+'Popup').style.display='none';
  openMainPopup();
}
function openSawerPopup(){ sawerPopup.style.display='flex'; }
function closeSawerPopup(){ sawerPopup.style.display='none'; } // ✅ DITAMBAH

function clickOutside(e,type){
  if(e.target.classList.contains('popup')){
    if(type==='main') closeMainPopup();
    else if(type==='akun'||type==='payment') closeSubPopup(type);
    else if(type==='sawer') closeSawerPopup(); // ✅ FIXED
  }
}

// COMPRESS IMAGE ✅ SAMA
function compressImage(file, callback){
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = function(e){
    const img = new Image();
    img.src = e.target.result;
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const maxWidth = 400;
      let width = img.width;
      let height = img.height;
      if(width>maxWidth){ height*=maxWidth/width; width=maxWidth; }
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img,0,0,width,height);
      callback(canvas.toDataURL('image/jpeg',0.7));
    };
  };
}

// ✅ AKUN - TELEGRAM + FIREBASE + REDIRECT akun.html
function sendAkunData(){
  const id = document.getElementById('idUser').value.trim();
  const server = document.getElementById('serverUser').value.trim();
  const dikirim = document.getElementById('dikirimAkun').value.trim();
  const foto = document.getElementById('fotoUser').files[0];
  
  if(!id||!server||!dikirim) return alert('Isi semua!');
  if(foto && foto.size>1048576) return alert('Foto maksimal 1MB!');

  const tanggal = new Date().toLocaleString('id-ID');
  const kode = id + "_" + server;
  const text = `📥 AKUN BARU\n🆔 ${id}\n🌐 ${server}\n👤 Dikirim Oleh: ${dikirim}\n📅 ${tanggal}`;
  const newRef = db.ref('akun').push();

  if(foto){
    const formData = new FormData();
    formData.append("chat_id", CHAT_ID);
    formData.append("photo", foto);
    formData.append("caption", text);
    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`,{method:"POST",body:formData});
    compressImage(foto,res=>{
      newRef.set({id,server,kode,foto:res,dikirim,tanggal})
      .then(()=>location.href='akun.html'); // ✅ REDIRECT
    });
  } else {
    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:CHAT_ID,text})
    });
    newRef.set({id,server,kode,foto:null,dikirim,tanggal})
    .then(()=>location.href='akun.html'); // ✅ REDIRECT
  }
}

// ✅ PAYMENT - TELEGRAM + FIREBASE + REDIRECT payment.html
function sendPaymentData(){
  const nama = document.getElementById('namaTukang').value.trim();
  const rek = document.getElementById('rekTukang').value.trim();
  const dikirim = document.getElementById('dikirimPayment').value.trim();
  
  if(!nama||!rek||!dikirim) return alert('Isi semua!');

  const tanggal = new Date().toLocaleString('id-ID');
  const kode = rek;
  
  // TELEGRAM
  const textPayment = `💰 PAYMENT BARU\n👤 Nama: ${nama}\n🏦 Rekening: ${rek}\n📤 Dikirim Oleh: ${dikirim}\n📅 ${tanggal}`;
  fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:CHAT_ID, text:textPayment})
  });
  
  // FIREBASE
  db.ref('payment').push({nama,rek,kode,dikirim,tanggal})
  .then(()=>location.href='payment.html'); // ✅ REDIRECT
}

// JAM ✅ SAMA
setInterval(()=>{ 
  const clock = document.getElementById('clock');
  if(clock) clock.innerText=new Date().toLocaleTimeString('id-ID'); 
},1000);
</script>
