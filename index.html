<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUHH MEMBANTU</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f9f9f9;
  color: #222;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
header { text-align:center;padding:20px 0;font-size:28px;font-weight:600;}
.container { width:90%;max-width:400px;display:flex;flex-direction:column;gap:15px;}
.box { background:#fff;border-radius:12px;padding:18px;text-align:center;cursor:pointer;border:1px solid #ccc;}
.box:hover { background:#f0f0f0;}
.add-btn { position:fixed;bottom:60px;right:15px;width:50px;height:50px;background:#333;color:#fff;font-size:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.popup { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);display:none;justify-content:center;align-items:center;}
.popup-box { background:#fff;padding:15px;border-radius:12px;width:85%;max-width:280px;text-align:center;}
.popup-box input { width:85%;padding:6px;margin:6px 0;}
.popup-box button { padding:8px 16px;background:#333;color:#fff;border:none;border-radius:6px;}
</style>
</head>

<body>

<header>FUHH MEMBANTU</header>

<div class="container">
  <div class="box" onclick="location.href='akun.html'">AKUN HB AN</div>
  <div class="box" onclick="location.href='payment.html'">PAYMENT</div>
</div>

<div class="add-btn" onclick="openMainPopup()">+</div>

<div class="popup" id="mainPopup">
  <div class="popup-box">
    <div onclick="openSubPopup('akun')">TAMBAHKAN AKUN</div>
    <div onclick="openSubPopup('payment')">TAMBAHKAN PAYMENT</div>
  </div>
</div>

<div class="popup" id="akunPopup">
  <div class="popup-box">
    <input type="text" id="idUser" placeholder="ID">
    <input type="text" id="serverUser" placeholder="Server">
    <input type="file" id="fotoUser">
    <button onclick="sendAkunData()">Kirim</button>
  </div>
</div>

<div class="popup" id="paymentPopup">
  <div class="popup-box">
    <input type="text" id="namaTukang" placeholder="Nama">
    <input type="text" id="rekTukang" placeholder="Rekening">
    <button onclick="sendPaymentData()">Kirim</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSDwdzrKNOhyoBHBO8aVq-FxAyZIwFdL4",
  authDomain: "berkoar-6fc3a.firebaseapp.com",
  databaseURL: "https://berkoar-6fc3a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "berkoar-6fc3a",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function openMainPopup(){mainPopup.style.display='flex';}
function openSubPopup(t){mainPopup.style.display='none';document.getElementById(t+'Popup').style.display='flex';}

// 🔥 AKUN
function sendAkunData(){
  const id=idUser.value;
  const server=serverUser.value;
  const foto=fotoUser.files[0];

  const kode = id + server; // 🔥

  const ref=db.ref('akun').push();

  if(foto){
    const reader=new FileReader();
    reader.onload=e=>{
      ref.set({id,server,kode,foto:e.target.result})
      .then(()=>location.href='akun.html');
    }
    reader.readAsDataURL(foto);
  }else{
    ref.set({id,server,kode,foto:null})
    .then(()=>location.href='akun.html');
  }
}

// 🔥 PAYMENT
function sendPaymentData(){
  const nama=namaTukang.value;
  const rek=rekTukang.value;

  const kode = rek; // 🔥

  db.ref('payment').push({nama,rek,kode})
  .then(()=>location.href='payment.html');
}
</script>

</body>
</html>
