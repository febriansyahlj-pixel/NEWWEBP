<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUHH MEMBANTU</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f9f9f9;
  color: #222;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
header {
  width: 100%;
  text-align: center;
  padding: 20px 0;
  font-size: 28px;
  font-weight: 600;
}
.container {
  width: 90%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}
.box {
  background: #fff;
  border-radius: 12px;
  padding: 18px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #ccc;
  box-shadow: 0 4px 8px rgba(0,0,0,0.08);
}
.box:hover { background: #f0f0f0; }
.description {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
  font-size: 14px;
  border: 1px solid #ccc;
  position: relative;
}
#clock {
  position: absolute;
  bottom: -25px;
  right: 15px;
  font-size: 12px;
}
footer {
  margin-top: auto;
  font-size: 12px;
  padding: 15px;
}
.add-btn {
  position: fixed;
  bottom: 60px;
  right: 15px;
  width: 50px;
  height: 50px;
  background: #333;
  color: #fff;
  font-size: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* POPUP */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  backdrop-filter: blur(5px);
  background: rgba(0,0,0,0.3);
  display:none;
  justify-content:center;
  align-items:center;
}
.popup-box {
  background:#fff;
  padding:15px;
  border-radius:12px;
  width:85%;
  max-width:280px;
  text-align:center;
}
.popup-box input {
  width: 85%;
  padding: 6px;
  margin: 6px 0;
}
.popup-box button {
  padding: 8px 16px;
  background:#333;
  color:#fff;
  border:none;
  border-radius:6px;
}
.popup-toggle-box {
  padding:8px;
  background:#eee;
  border-radius:8px;
  margin:8px 0;
  cursor:pointer;
}
</style>
</head>
<body>

<header>FUHH MEMBANTU</header>

<div id="mainContent" class="container">
  <div class="box" onclick="location.href='akun.html'">AKUN HB AN</div>
  <div class="box" onclick="location.href='payment.html'">PAYMENT</div>
  <div class="box" onclick="openSawerPopup()">SAWER ADMIN</div>

  <div class="description">
    Website ini dibuat untuk mengurangi korban HB akun MLBB.
    <div id="clock"></div>
  </div>
</div>

<div class="add-btn" onclick="openMainPopup()">+</div>

<!-- MAIN POPUP -->
<div class="popup" id="mainPopup" onclick="clickOutside(event,'main')">
  <div class="popup-box">
    <div class="popup-toggle-box" onclick="openSubPopup('akun')">TAMBAHKAN AKUN</div>
    <div class="popup-toggle-box" onclick="openSubPopup('payment')">TAMBAHKAN PAYMENT</div>
  </div>
</div>

<!-- AKUN -->
<div class="popup" id="akunPopup" onclick="clickOutside(event,'akun')">
  <div class="popup-box">
    <input type="text" id="idUser" placeholder="ID">
    <input type="text" id="serverUser" placeholder="Server">
    <input type="text" id="dikirimAkun" placeholder="Dikirim Oleh">
    <input type="file" id="fotoUser" accept="image/*">
    <button onclick="sendAkunData()">Kirim</button>
  </div>
</div>

<!-- PAYMENT -->
<div class="popup" id="paymentPopup" onclick="clickOutside(event,'payment')">
  <div class="popup-box">
    <input type="text" id="namaTukang" placeholder="Nama">
    <input type="text" id="rekTukang" placeholder="Rekening">
    <input type="text" id="dikirimPayment" placeholder="Dikirim Oleh">
    <button onclick="sendPaymentData()">Kirim</button>
  </div>
</div>

<!-- SAWER -->
<div class="popup" id="sawerPopup" onclick="clickOutside(event,'sawer')">
  <div class="popup-box">
    <p>Sawer Seikhlasnya Guysss</p>
    <a href="https://saweria.co/F3br1z"><button>Sawer</button></a>
  </div>
</div>

<footer>© 2026 Fuhh</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSDwdzrKNOhyoBHBO8aVq-FxAyZIwFdL4",
  authDomain: "berkoar-6fc3a.firebaseapp.com",
  databaseURL: "https://berkoar-6fc3a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "berkoar-6fc3a",
  storageBucket: "berkoar-6fc3a.firebasestorage.app",
  messagingSenderId: "801041924361",
  appId: "1:801041924361:web:30e6d18b0e97837a6b93d8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ambil popup element
const mainPopup = document.getElementById('mainPopup');
const akunPopup = document.getElementById('akunPopup');
const paymentPopup = document.getElementById('paymentPopup');
const sawerPopup = document.getElementById('sawerPopup');

// POPUP FUNCTIONS
function openMainPopup(){ mainPopup.style.display='flex'; }
function closeMainPopup(){ mainPopup.style.display='none'; }
function openSubPopup(type){
  closeMainPopup();
  document.getElementById(type+'Popup').style.display='flex';
}
function closeSubPopup(type){
  document.getElementById(type+'Popup').style.display='none';
  openMainPopup();
}
function openSawerPopup(){ sawerPopup.style.display='flex'; }
function clickOutside(e,type){
  if(e.target.classList.contains('popup')){
    if(type==='main') closeMainPopup();
    else if(type==='akun'||type==='payment') closeSubPopup(type);
    else closeSawerPopup();
  }
}

// COMPRESS IMAGE
function compressImage(file, callback){
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = function(e){
    const img = new Image();
    img.src = e.target.result;
    img.onload = function(){
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      if(width>400){ height *= 400/width; width=400; }
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img,0,0,width,height);
      callback(canvas.toDataURL('image/jpeg',0.7));
    };
  };
}

// AKUN
function sendAkunData(){
  const id = idUser.value.trim();
  const server = serverUser.value.trim();
  const dikirim = dikirimAkun.value.trim();
  const foto = fotoUser.files[0];
  if(!id||!server||!dikirim) return alert('Isi semua!');
  if(foto && foto.size>1048576) return alert('Foto maksimal 1MB!');
  
  const token=8707862536:AAHy5jcse4lm9YmKPJ7AYfuR5JwgxPj1fsM;
  const chat_id=7717485230;
  const tanggal = new Date().toLocaleString();
  const kode = id + "_" + server;
  const text = `📥 AKUN BARU\n🆔 ${id}\n🌐 ${server}\n👤 Dikirim Oleh: ${dikirim}\n📅 ${tanggal}`;

  const newRef = db.ref('akun').push();
  if(foto){
    const formData = new FormData();
    formData.append("chat_id", chat_id);
    formData.append("photo", foto);
    formData.append("caption", text);
    fetch(`https://api.telegram.org/bot${token}/sendPhoto`,{method:"POST",body:formData});
    compressImage(foto,res=>{
      newRef.set({id,server,kode,foto:res,dikirim,tanggal}).then(()=>location.href='akun.html');
    });
  } else {
    fetch(`https://api.telegram.org/bot${token}/sendMessage`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id,text})
    });
    newRef.set({id,server,kode,foto:null,dikirim,tanggal}).then(()=>location.href='akun.html');
  }
}

// PAYMENT
function sendPaymentData(){
  const nama = namaTukang.value.trim();
  const rek = rekTukang.value.trim();
  const dikirim = dikirimPayment.value.trim();
  if(!nama||!rek||!dikirim) return alert('Isi semua!');
  const kode = rek;
  const tanggal = new Date().toLocaleString();
  db.ref('payment').push({nama,rek,kode,dikirim,tanggal}).then(()=>location.href='payment.html');
}

// JAM
setInterval(()=>{ clock.innerText=new Date().toLocaleTimeString(); },1000);
</script>
</body>
</html>
