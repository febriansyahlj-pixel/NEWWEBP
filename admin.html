<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 10px;
}
h2 {
  text-align: center;
}
.box {
  background: #222;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}
button {
  margin-top: 8px;
  padding: 6px 10px;
  border: none;
  background: red;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
.logout {
  background: orange;
}
img {
  width: 100%;
  margin-top: 5px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>🔥 ADMIN PANEL</h2>

<button class="logout" onclick="logout()">Logout</button>

<h3>DATA AKUN</h3>
<div id="akunList"></div>

<h3>DATA PAYMENT</h3>
<div id="paymentList"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// 🔐 PROTECT
if(localStorage.getItem("admin") !== "true"){
  alert("Akses ditolak!");
  location.href = "login.html";
}

// CONFIG
firebase.initializeApp({
  databaseURL: "https://berkoar-6fc3a-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = firebase.database();

// 🚪 LOGOUT
function logout(){
  localStorage.removeItem("admin");
  location.href="login.html";
}

// 🔥 LOAD AKUN
db.ref('akun').on('value', snap=>{
  akunList.innerHTML = '';

  snap.forEach(d=>{
    const key = d.key;
    const data = d.val();

    akunList.innerHTML += `
      <div class="box">
        <b>ID:</b> ${data.id}<br>
        <b>Server:</b> ${data.server}<br>
        <b>Kode:</b> ${data.kode}<br>
        ${data.foto ? `<img src="${data.foto}">` : ``}
        <button onclick="hapusAkun('${key}')">Hapus</button>
      </div>
    `;
  });
});

// 🔥 LOAD PAYMENT
db.ref('payment').on('value', snap=>{
  paymentList.innerHTML = '';

  snap.forEach(d=>{
    const key = d.key;
    const data = d.val();

    paymentList.innerHTML += `
      <div class="box">
        <b>Nama:</b> ${data.nama}<br>
        <b>Rekening:</b> ${data.rek}<br>
        <b>Kode:</b> ${data.kode}<br>
        <button onclick="hapusPayment('${key}')">Hapus</button>
      </div>
    `;
  });
});

// ❌ HAPUS AKUN
function hapusAkun(key){
  if(confirm("Hapus data ini?")){
    db.ref('akun/'+key).remove();
  }
}

// ❌ HAPUS PAYMENT
function hapusPayment(key){
  if(confirm("Hapus data ini?")){
    db.ref('payment/'+key).remove();
  }
}
</script>

</body>
</html>
